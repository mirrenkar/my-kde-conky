conky.config = {
--==============================================================================

--  Created : 2021/Apr/04
--  this theme is for conky version 1.10.8 or newer
-- 
--  SEGINUS
--
--  author  : Closebox73
--  license : Distributed under the terms of GPLv3

--==============================================================================

-- Size and Position settings --
  alignment = 'top_left',
  gap_x = 0,
  gap_y = 60,
  maximum_width = 680,
  minimum_height = 300,
  minimum_width = 680,
  
-- Text settings --
  use_xft = true,
  override_utf8_locale = true,
  font = 'Roboto:light:size=2',
  
-- Color Settings --
  default_color = 'white',
  default_outline_color = 'white',
  default_shade_color = 'white',
  color1 = '#404040',
  
-- Window Settings --
  own_window = true,
  own_window_class = 'Conky',
  own_window_type = 'normal',
  own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

  -- Настройка прозрачности --
  own_window_transparent = false,     -- Отключаем полную "дырявую" прозрачность
  own_window_argb_visual = true,      -- Включаем ARGB
  own_window_argb_value = 0,        -- 0 - прозрачный, 255 - непрозрачный (выберите по вкусу)
  own_window_colour = '#000000',      -- Черный цвет

  background = false,
  border_width = 1,
  draw_blended = false,
  draw_borders = false,
  draw_graph_borders = false,
  draw_outline = false,
  draw_shades = false,
  stippled_borders = 0,
  
-- Others --
  cpu_avg_samples = 2,
  net_avg_samples = 2,
  double_buffer = true,
  out_to_console = false,
  out_to_stderr = false,
  extra_newline = false,
  update_interval = 1,
  uppercase = false,
  use_spacer = 'none',
  show_graph_scale = false,
  show_graph_range = false
}

conky.text = [[
${image ~/.conky/Seginus/res/bg.png -p -230,0 -s 480x120}\
${image ~/.conky/Seginus/res/white.png -p -230,130 -s 400x100}\
${execi 60 ~/.conky/Seginus/scripts/weather-v2.0.sh}\
${execi 100 ~/.conky/Seginus/scripts/weather-icon.sh JDWS-02 $(cat ~/.cache/weather.json | jq -r '.weather[0].icon')}${image ~/.cache/weather-icon.png -p 20,148 -s 60x60}\
${offset 10}${voffset 25}${color}${font Beckman:size=47}${time %I:%M}${font Beckman:size=20}${time %p}${font}
${offset 270}${voffset -55}${font Comfortaa:bold:size=18}Hello ${execi 6000 whoami}, Today is
${offset 270}${voffset }${font Comfortaa:bold:size=22}${time %a, %d %B %Y}
${offset 185}${voffset 50}${color}${font Comfortaa:bold:size=16}${execi 100 cat ~/.cache/weather.json | jq -r '.name'} is now ${execi 100 cat ~/.cache/weather.json | jq -r '.weather[0].main'}. ${font}
${offset 88}${voffset -15}${color1}${font Ubuntu:bold:size=30}${execi 100 cat ~/.cache/weather.json | jq '.main.temp' | awk '{print int($1+0.5)}'}°${font}
${offset 185}${voffset -15}${color}${font Comfortaa:bold:size=10}Wind speed is ${execi 600 cat ~/.cache/weather.json | jq '.wind.speed'} m/s at direction ${execi 600 cat ~/.cache/weather.json | jq '.wind.deg'}°
${offset 185}${voffset }${color}${font Comfortaa:bold:size=10}And Humidity is ${execi 600 cat ~/.cache/weather.json | jq '.main.humidity'}%.
]]
